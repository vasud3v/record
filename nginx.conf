events {
    worker_connections 2048;
}

http {
    # Upstream for Byparr instances - Docker DNS will resolve all replicas
    upstream byparr_backend {
        # Docker Compose automatically creates DNS entries for all replicas
        # byparr:8191 will round-robin across all instances
        server byparr:8191 max_fails=3 fail_timeout=30s;
        
        keepalive 64;
    }

    server {
        listen 80;
        
        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Byparr API endpoint
        location / {
            proxy_pass http://byparr_backend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            
            # Long timeouts for Cloudflare challenges
            proxy_connect_timeout 10s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
            
            # No buffering for streaming responses
            proxy_buffering off;
            proxy_request_buffering off;
            
            # Retry on failure
            proxy_next_upstream error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 3;
        }
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
