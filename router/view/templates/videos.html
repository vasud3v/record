<!DOCTYPE html>
<html lang="en" class="is-secondary">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tocas/5.0.1/tocas.min.css" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/tocas/5.0.1/tocas.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
        <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
        <link rel="manifest" href="/static/site.webmanifest">
        <title>Videos - GoondVR</title>
        <style>
            /* Copied styles from index.html for consistent theming */
            :root {
                --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                --gradient-success: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
                --gradient-danger: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
                --glass-bg: rgba(255, 255, 255, 0.05);
                --glass-border: rgba(255, 255, 255, 0.1);
                --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.15);
                --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.2);
                --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.3);
            }

            body {
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
                background-attachment: fixed;
                min-height: 100vh;
                color: #fff;
            }

            .ts-container {
                background: var(--glass-bg);
                backdrop-filter: blur(10px);
                border-radius: 24px;
                border: 1px solid var(--glass-border);
                box-shadow: var(--shadow-lg);
                padding: 2rem !important;
                margin-top: 2rem;
                margin-bottom: 2rem;
            }

            .ts-header.is-huge {
                background: var(--gradient-primary);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                font-size: 3rem !important;
                letter-spacing: -0.02em;
            }

            /* Custom Accordion / Details styling */
            .channel-group {
                background: var(--glass-bg);
                backdrop-filter: blur(10px);
                border: 1px solid var(--glass-border);
                border-radius: 12px;
                margin-bottom: 1rem;
                overflow: hidden;
            }
            
            .channel-group-header {
                padding: 1rem 1.5rem;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: space-between;
                background: rgba(255, 255, 255, 0.02);
                transition: background 0.3s;
                user-select: none;
            }
            .channel-group-header:hover {
                background: rgba(255, 255, 255, 0.08);
            }
            
            .channel-group-content {
                display: none;
                padding: 1rem 1.5rem;
                border-top: 1px solid var(--glass-border);
            }
            
            .channel-group.is-open .channel-group-content {
                display: block;
            }
            
            .channel-group.is-open .chevron-icon {
                transform: rotate(180deg);
            }
            
            .chevron-icon {
                transition: transform 0.3s;
            }

            .video-item {
                background: rgba(0, 0, 0, 0.2);
                border: 1px solid var(--glass-border);
                border-radius: 12px;
                padding: 1rem;
                display: flex;
                align-items: center;
                gap: 1rem;
                margin-bottom: 0.75rem;
                transition: all 0.3s ease;
            }
            .video-item:hover {
                background: rgba(255, 255, 255, 0.08);
                border-color: rgba(102, 126, 234, 0.4);
            }
            
            /* Input styling */
            .ts-input input {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--glass-border);
                border-radius: 10px;
                color: #fff;
            }
            .ts-input input:focus {
                background: rgba(255, 255, 255, 0.08);
                border-color: rgba(102, 126, 234, 0.5);
                box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            }

            /* Buttons */
            .ts-button {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                border-radius: 12px;
                font-weight: 600;
            }
            .ts-button:not(.is-outlined):not(.is-secondary) {
                background: var(--gradient-primary);
                border: none;
            }
            .ts-button:hover {
                transform: translateY(-2px);
            }

            /* Toast notification styles */
            .toast {
                position: fixed;
                bottom: 2rem;
                right: 2rem;
                background: var(--glass-bg);
                backdrop-filter: blur(20px);
                border: 1px solid var(--glass-border);
                border-radius: 12px;
                padding: 1rem 1.5rem;
                box-shadow: var(--shadow-lg);
                z-index: 9999;
                animation: slideIn 0.3s ease;
            }

            @keyframes slideIn {
                from { transform: translateX(400px); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            
            /* Scrollbar styling */
            ::-webkit-scrollbar { width: 10px; height: 10px; }
            ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
            ::-webkit-scrollbar-thumb { background: var(--gradient-primary); border-radius: 10px; }
            ::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); }
        </style>
    </head>
    <body>
        <div class="ts-container has-vertically-padded-big" style="--width: 990px">
            <!-- Header -->
            <div class="ts-grid is-bottom-aligned">
                <div class="column is-fluid">
                    <div class="ts-header is-huge is-uppercased is-heavy has-leading-small">Videos</div>
                    <div class="ts-meta">
                        <div class="item">
                            <span class="ts-text is-description is-bold">GOONDVR RECORDINGS</span>
                        </div>
                    </div>
                </div>
                <div class="column">
                    <a href="/" class="ts-button is-start-icon is-outlined">
                        <span class="ts-icon is-arrow-left-icon"></span>
                        Back to Home
                    </a>
                </div>
                <div class="column">
                    <button type="button" class="ts-button is-start-icon" onclick="uploadCompletedFiles()" title="Upload completed files to all configured hosts (GoFile, TurboViPlay, VOE.sx, Streamtape)">
                        <span class="ts-icon is-cloud-arrow-up-icon"></span>
                        Upload Completed
                    </button>
                </div>
            </div>
            <!-- / Header -->

            <div class="ts-divider has-vertically-spaced-large"></div>

            <!-- Filter -->
            <div class="ts-input has-bottom-spaced-large">
                <input type="text" id="video-search" placeholder="🔍 Search by streamer name..." />
            </div>

            <!-- Status Areas -->
            <div id="videos-loading" style="text-align: center; padding: 4rem 0;">
                <span class="ts-icon is-spinner-icon is-spinning is-large"></span>
                <div class="ts-text is-description has-top-spaced">Loading videos...</div>
            </div>

            <div id="videos-empty" style="display: none; text-align: center; padding: 4rem 0;">
                <span class="ts-icon is-film-icon" style="font-size: 3rem; opacity: 0.3;"></span>
                <div class="ts-text is-description has-top-spaced" id="videos-empty-msg">No videos found</div>
            </div>

            <!-- Videos List -->
            <div id="videos-list" style="display: none;"></div>

            <div class="ts-divider has-vertically-spaced-large"></div>
            
            <div class="ts-text is-description is-end-aligned">
                <span class="ts-icon is-database-icon is-end-spaced"></span>
                <span id="videos-count">0 videos</span>
            </div>
        </div>

        <script>
            let allVideos = [];

            document.addEventListener("DOMContentLoaded", function() {
                loadVideos();
                
                document.getElementById('video-search').addEventListener('input', function(e) {
                    const term = e.target.value.toLowerCase();
                    const filtered = allVideos.filter(v => 
                        v.streamer_name.toLowerCase().includes(term) || 
                        (v.filename && v.filename.toLowerCase().includes(term))
                    );
                    displayVideos(filtered);
                });
            });

            function loadVideos() {
                document.getElementById('videos-loading').style.display = 'block';
                document.getElementById('videos-list').style.display = 'none';
                document.getElementById('videos-empty').style.display = 'none';

                fetch('/api/videos')
                    .then(r => r.json())
                    .then(data => {
                        document.getElementById('videos-loading').style.display = 'none';
                        
                        if (data.error) {
                            document.getElementById('videos-empty').style.display = 'block';
                            document.getElementById('videos-empty-msg').textContent = data.error;
                            return;
                        }

                        allVideos = data.videos || [];
                        displayVideos(allVideos);
                    })
                    .catch(err => {
                        document.getElementById('videos-loading').style.display = 'none';
                        document.getElementById('videos-empty').style.display = 'block';
                        document.getElementById('videos-empty-msg').textContent = 'Failed to load videos';
                    });
            }

            function toggleChannelGroup(headerEl) {
                const group = headerEl.closest('.channel-group');
                group.classList.toggle('is-open');
            }

            function displayVideos(videos) {
                const container = document.getElementById('videos-list');
                const countEl = document.getElementById('videos-count');
                
                if (!videos || videos.length === 0) {
                    document.getElementById('videos-empty').style.display = 'block';
                    container.style.display = 'none';
                    countEl.textContent = '0 videos';
                    return;
                }

                countEl.textContent = `${videos.length} video${videos.length !== 1 ? 's' : ''}`;
                container.style.display = 'block';
                document.getElementById('videos-empty').style.display = 'none';

                // Group by streamer
                const byStreamer = {};
                videos.forEach(v => {
                    if (!byStreamer[v.streamer_name]) {
                        byStreamer[v.streamer_name] = [];
                    }
                    byStreamer[v.streamer_name].push(v);
                });

                // Compute latest video date per streamer to sort channels
                const streamerLatestDate = {};
                Object.keys(byStreamer).forEach(streamer => {
                    const sorted = byStreamer[streamer].sort((a, b) => new Date(b.upload_date) - new Date(a.upload_date));
                    byStreamer[streamer] = sorted; // Keep videos sorted descending
                    streamerLatestDate[streamer] = new Date(sorted[0].upload_date).getTime();
                });

                // Sort channels by their latest recording date, descending
                const sortedStreamers = Object.keys(byStreamer).sort((a, b) => streamerLatestDate[b] - streamerLatestDate[a]);

                let html = '';
                sortedStreamers.forEach(streamer => {
                    const vids = byStreamer[streamer];
                    html += `
                        <div class="channel-group">
                            <div class="channel-group-header" onclick="toggleChannelGroup(this)">
                                <div style="display: flex; align-items: center; gap: 0.5rem;">
                                    <span class="ts-icon is-user-icon"></span>
                                    <span class="ts-text is-bold is-large">${streamer}</span>
                                    <span class="ts-badge is-small" style="background: var(--gradient-primary); color: white; border: none; font-weight: bold;">${vids.length}</span>
                                </div>
                                <span class="ts-icon is-chevron-down-icon chevron-icon"></span>
                            </div>
                            <div class="channel-group-content">
                                ${vids.map(v => {
                                    const date = new Date(v.upload_date);
                                    const dateStr = date.toLocaleString();
                                    const hasThumbnail = v.thumbnail_link && v.thumbnail_link !== '';
                                    const thumbnailUrl = hasThumbnail ? v.thumbnail_link : '';
                                    
                                    const hosts = [];
                                    if (v.gofile_link) hosts.push({ name: 'GoFile', link: v.gofile_link, icon: 'folder-icon' });
                                    if (v.turboviplay_link) hosts.push({ name: 'TurboViPlay', link: v.turboviplay_link, icon: 'play-icon' });
                                    if (v.voesx_link) hosts.push({ name: 'VOE.sx', link: v.voesx_link, icon: 'video-icon' });
                                    if (v.streamtape_link) hosts.push({ name: 'Streamtape', link: v.streamtape_link, icon: 'film-icon' });
                                    
                                    return `
                                        <div class="video-item">
                                            ${hasThumbnail ? `
                                                <div style="flex-shrink: 0;">
                                                    <img src="${thumbnailUrl}" alt="Thumbnail" style="
                                                        width: 160px;
                                                        height: 90px;
                                                        object-fit: cover;
                                                        border-radius: 8px;
                                                        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
                                                    " onerror="this.parentElement.style.display='none'" />
                                                </div>
                                            ` : ''}
                                            <div style="flex: 1; min-width: 0;">
                                                <div class="ts-text is-bold" style="margin-bottom: 0.25rem;">${v.filename || 'Unknown Filename'}</div>
                                                <div class="ts-text is-small is-description" style="margin-bottom: 0.75rem;">Recorded on: ${dateStr}</div>
                                                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                                                    ${hosts.map(host => `
                                                        <a href="${host.link}" target="_blank" class="ts-button is-small is-start-icon" style="flex-shrink: 0;">
                                                            <span class="ts-icon is-${host.icon}"></span>
                                                            ${host.name}
                                                        </a>
                                                    `).join('')}
                                                </div>
                                            </div>
                                            ${hosts.length > 0 ? `
                                                <button class="ts-button is-small is-icon is-outlined" onclick="copyAllLinks(${JSON.stringify(hosts.map(h => h.link))}, this)" title="Copy all links">
                                                    <span class="ts-icon is-copy-icon"></span>
                                                </button>
                                            ` : ''}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
            }

            function copyAllLinks(links, btn) {
                if (!links || links.length === 0) return;
                const text = links.join('\n');
                navigator.clipboard.writeText(text).then(() => {
                    const originalIcon = btn.innerHTML;
                    btn.innerHTML = '<span class="ts-icon is-check-icon"></span>';
                    btn.classList.add('is-positive');
                    setTimeout(() => {
                        btn.innerHTML = originalIcon;
                        btn.classList.remove('is-positive');
                    }, 2000);
                    showToast('Links copied to clipboard', 'success');
                }).catch(err => {
                    console.error('Failed to copy text: ', err);
                    showToast('Failed to copy links', 'error');
                });
            }

            function uploadCompletedFiles() {
                const btn = document.querySelector('button[onclick="uploadCompletedFiles()"]');
                const originalHtml = btn.innerHTML;
                
                btn.innerHTML = '<span class="ts-icon is-spinner-icon is-spinning"></span> Starting...';
                btn.disabled = true;

                fetch('/api/upload/completed', {
                    method: 'POST',
                })
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        showToast(data.error, 'error');
                    } else {
                        showToast(data.message, 'success');
                    }
                })
                .catch(err => {
                    showToast('Failed to start upload: ' + err.message, 'error');
                })
                .finally(() => {
                    setTimeout(() => {
                        btn.innerHTML = originalHtml;
                        btn.disabled = false;
                    }, 2000);
                });
            }

            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = 'toast';
                
                const icon = type === 'success' ? '✓' : type === 'error' ? '✗' : 'ℹ';
                const gradient = type === 'success' ? 'var(--gradient-success)' : 
                                type === 'error' ? 'var(--gradient-danger)' : 
                                'var(--gradient-primary)';
                
                toast.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <div style="width: 32px; height: 32px; border-radius: 50%; background: ${gradient}; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px;">
                            ${icon}
                        </div>
                        <div style="color: white; font-weight: 500;">${message}</div>
                    </div>
                `;
                
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.animation = 'slideIn 0.3s ease reverse';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }
        </script>
    </body>
</html>
