name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allow manual trigger

env:
  EC2_HOST: 54.210.37.19
  EC2_USER: ubuntu
  APP_DIR: /home/ubuntu/goondvr

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2-key.pem
          chmod 600 ~/.ssh/ec2-key.pem
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH Connection
        run: |
          ssh -i ~/.ssh/ec2-key.pem -o StrictHostKeyChecking=no ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "echo 'SSH connection successful'"

      - name: Create deployment package
        run: |
          tar -czf deploy.tar.gz \
            --exclude='.git' \
            --exclude='videos' \
            --exclude='database' \
            --exclude='*.exe' \
            --exclude='node_modules' \
            --exclude='.github' \
            --exclude='aws-secrets' \
            --exclude='run_logs.txt' \
            --exclude='*.log' \
            . || [ $? -eq 1 ]

      - name: Upload to EC2
        run: |
          scp -i ~/.ssh/ec2-key.pem -o StrictHostKeyChecking=no \
            deploy.tar.gz \
            ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2-key.pem -o StrictHostKeyChecking=no \
            ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'ENDSSH'
          
          set -e
          
          echo "🚀 Starting deployment..."
          
          # Create app directory if it doesn't exist
          mkdir -p ${{ env.APP_DIR }}
          
          # Backup current deployment
          if [ -d "${{ env.APP_DIR }}/backup" ]; then
            rm -rf ${{ env.APP_DIR }}/backup
          fi
          
          if [ -d "${{ env.APP_DIR }}/conf" ]; then
            echo "📦 Backing up configuration..."
            mkdir -p ${{ env.APP_DIR }}/backup
            cp -r ${{ env.APP_DIR }}/conf ${{ env.APP_DIR }}/backup/
            cp -r ${{ env.APP_DIR }}/database ${{ env.APP_DIR }}/backup/ 2>/dev/null || true
          fi
          
          # Extract new code
          echo "📂 Extracting new code..."
          cd ${{ env.APP_DIR }}
          tar -xzf /tmp/deploy.tar.gz
          rm /tmp/deploy.tar.gz
          
          # Restore configuration if backed up
          if [ -d "${{ env.APP_DIR }}/backup/conf" ]; then
            echo "♻️  Restoring configuration..."
            cp -r ${{ env.APP_DIR }}/backup/conf/* ${{ env.APP_DIR }}/conf/
            cp -r ${{ env.APP_DIR }}/backup/database/* ${{ env.APP_DIR }}/database/ 2>/dev/null || true
          fi
          
          # Ensure directories exist
          mkdir -p videos/completed database conf
          
          # Check if docker compose v2 or v1 is available
          if command -v docker &> /dev/null && docker compose version &> /dev/null; then
            DOCKER_COMPOSE="docker compose"
          elif command -v docker-compose &> /dev/null; then
            DOCKER_COMPOSE="docker-compose"
          else
            echo "❌ Docker Compose not found. Installing..."
            sudo apt-get update
            sudo apt-get install -y docker-compose-plugin
            DOCKER_COMPOSE="docker compose"
          fi
          
          echo "Using: $DOCKER_COMPOSE"
          
          # Stop existing containers
          echo "🛑 Stopping existing containers..."
          sudo $DOCKER_COMPOSE down || true
          
          # Build and start containers
          echo "🔨 Building Docker images..."
          sudo $DOCKER_COMPOSE build --no-cache
          
          echo "▶️  Starting containers..."
          sudo $DOCKER_COMPOSE up -d
          
          # Wait for services to be healthy
          echo "⏳ Waiting for services to start..."
          sleep 10
          
          # Check container status
          echo "✅ Checking container status..."
          sudo $DOCKER_COMPOSE ps
          
          # Show recent logs
          echo "📋 Recent logs:"
          sudo $DOCKER_COMPOSE logs --tail=20
          
          echo "🎉 Deployment completed successfully!"
          
          ENDSSH

      - name: Verify Deployment
        run: |
          echo "🔍 Verifying deployment..."
          sleep 5
          
          # Check if web UI is accessible
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.EC2_HOST }}:8080 || echo "000")
          
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "✅ Web UI is accessible at http://${{ env.EC2_HOST }}:8080"
          else
            echo "⚠️  Web UI returned status: $HTTP_STATUS"
            echo "Check logs with: ssh ${{ env.EC2_USER }}@${{ env.EC2_HOST }} 'cd ${{ env.APP_DIR }} && sudo docker-compose logs'"
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/ec2-key.pem
          rm -f deploy.tar.gz

      - name: Notify on Success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Application URL: http://${{ env.EC2_HOST }}:8080"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs above for details."
