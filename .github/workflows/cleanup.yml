name: Cleanup EC2 Disk

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC

jobs:
  cleanup:
    name: Clean EC2 Disk Space
    runs-on: ubuntu-latest
    
    steps:
      - name: Validate secrets
        run: |
          echo "🔍 Validating GitHub secrets..."
          
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ] || [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "❌ ERROR: Required secrets are missing!"
            exit 1
          fi
          
          echo "✅ Secrets validated"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2-key.pem
          chmod 600 ~/.ssh/ec2-key.pem
          
          cat > ~/.ssh/config <<EOF
          Host ec2-deploy
            HostName ${{ secrets.EC2_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/ec2-key.pem
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config

      - name: Run cleanup
        run: |
          echo "🧹 Running disk cleanup on EC2..."
          
          ssh ec2-deploy bash << 'ENDSSH'
            cd /home/ubuntu/goondvr
            
            echo "Running cleanup script..."
            ./scripts/cleanup-disk.sh
            
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📊 Final Status:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            df -h / | grep -E "Filesystem|/dev"
            echo ""
            sudo docker system df
          ENDSSH

      - name: Check disk usage
        run: |
          ssh ec2-deploy bash << 'ENDSSH'
            DISK_USAGE=$(df / | tail -1 | awk '{print $5}' | sed 's/%//')
            
            echo ""
            if [ $DISK_USAGE -gt 85 ]; then
              echo "⚠️ WARNING: Disk usage is ${DISK_USAGE}% (> 85%)"
              exit 1
            elif [ $DISK_USAGE -gt 75 ]; then
              echo "⚠️ CAUTION: Disk usage is ${DISK_USAGE}% (> 75%)"
            else
              echo "✅ Disk usage is healthy: ${DISK_USAGE}%"
            fi
          ENDSSH

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/ec2-key.pem ~/.ssh/config
