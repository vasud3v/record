name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip Docker rebuild (faster)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Add timeout to prevent hanging builds
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          echo "🔍 Validating GitHub secrets..."
          
          # Check EC2_SSH_KEY
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "❌ ERROR: EC2_SSH_KEY secret is missing!"
            echo "Please add your EC2 private key to GitHub secrets"
            exit 1
          fi
          echo "✅ EC2_SSH_KEY is configured"
          
          # Check EC2_HOST
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "❌ ERROR: EC2_HOST secret is missing!"
            echo "Please add your EC2 IP address to GitHub secrets"
            exit 1
          fi
          echo "✅ EC2_HOST is configured: ${{ secrets.EC2_HOST }}"
          
          # Validate IP format
          if ! echo "${{ secrets.EC2_HOST }}" | grep -E '^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$' > /dev/null; then
            echo "⚠️  WARNING: EC2_HOST doesn't look like an IP address"
            echo "Current value: ${{ secrets.EC2_HOST }}"
            echo "Expected format: 1.2.3.4"
          fi
          
          echo ""
          echo "✅ All secrets validated successfully!"

      - name: Configure SSH
        run: |
          echo "🔐 Setting up SSH configuration..."
          
          # Create SSH directory
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Write SSH key
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2-key.pem
          chmod 600 ~/.ssh/ec2-key.pem
          
          # Create SSH config with keepalive settings
          cat > ~/.ssh/config <<EOF
          Host ec2-deploy
            HostName ${{ secrets.EC2_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/ec2-key.pem
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
            ServerAliveInterval 60
            ServerAliveCountMax 10
            TCPKeepAlive yes
          EOF
          chmod 600 ~/.ssh/config
          
          echo "✅ SSH configured for ${{ secrets.EC2_HOST }}"

      - name: Test SSH connection
        run: |
          echo "🔌 Testing SSH connection..."
          
          if ssh ec2-deploy "echo '✅ SSH connection successful!'" 2>&1; then
            echo "Connection test passed!"
          else
            echo "❌ SSH connection failed!"
            echo "Please check:"
            echo "  1. EC2 instance is running"
            echo "  2. Security group allows SSH from GitHub Actions IPs"
            echo "  3. SSH key is correct"
            exit 1
          fi

      - name: Deploy application
        run: |
          echo "🚀 Starting deployment..."
          
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=10 ec2-deploy bash << 'ENDSSH'
            set -e
            
            echo "📍 Current directory: $(pwd)"
            cd /home/ubuntu/goondvr || {
              echo "❌ Directory /home/ubuntu/goondvr not found!"
              exit 1
            }
            
            echo ""
            echo "📥 Pulling latest changes from GitHub..."
            git fetch origin
            git reset --hard origin/main
            git pull origin main
            
            echo ""
            echo "🔍 Checking for active recordings..."
            ACTIVE_RECORDINGS=$(sudo docker exec goondvr sh -c 'ls -1 /usr/src/app/videos/*.ts /usr/src/app/videos/*.mp4 2>/dev/null | wc -l' || echo "0")
            
            if [ "$ACTIVE_RECORDINGS" -gt 0 ] && [ "${{ github.event.inputs.skip_build }}" != "true" ]; then
              echo "⚠️  WARNING: $ACTIVE_RECORDINGS active recording(s) detected!"
              echo "📊 Current recordings:"
              sudo docker exec goondvr sh -c 'ls -lh /usr/src/app/videos/*.ts /usr/src/app/videos/*.mp4 2>/dev/null || echo "None"'
              echo ""
              echo "⏳ Waiting 30 seconds before proceeding with graceful shutdown..."
              echo "   (This allows current segments to finish writing)"
              sleep 30
            fi
            
            echo ""
            echo "🐳 Managing Docker containers..."
            
            if [ "${{ github.event.inputs.skip_build }}" = "true" ]; then
              echo "⏩ Skipping rebuild, just restarting..."
              sudo docker compose restart
            else
              echo "🏗️  Rebuilding containers with graceful shutdown..."
              
              # Graceful stop with extended timeout (allows recordings to finalize)
              echo "🛑 Stopping containers gracefully (up to 5 minutes for finalization)..."
              sudo docker compose stop -t 300  # 5 minute timeout
              
              # Remove stopped containers
              sudo docker compose rm -f
              
              # Build with better error handling and retry
              echo "🔨 Building Docker image (this may take a few minutes)..."
              sudo DOCKER_BUILDKIT=1 docker compose build --no-cache recorder || {
                echo "⚠️  First build attempt failed, retrying with fresh cache..."
                sleep 5
                sudo docker system prune -f
                sudo DOCKER_BUILDKIT=1 docker compose build recorder
              }
              
              # Start all services
              echo "🚀 Starting services..."
              sudo docker compose up -d
            fi
            
            echo ""
            echo "🧹 Smart cache cleanup (preserving Byparr cache)..."
            
            # Clean Docker build cache only
            echo "  → Cleaning build cache..."
            sudo docker builder prune -af
            
            # Clean unused images (keep running ones)
            echo "  → Cleaning unused images..."
            sudo docker image prune -af
            
            # Clean apt cache
            echo "  → Cleaning apt cache..."
            sudo apt-get clean 2>/dev/null || true
            
            # Clean old logs
            echo "  → Cleaning old logs..."
            sudo journalctl --vacuum-time=3d 2>/dev/null || true
            
            echo "  ✅ Cleanup complete (Byparr cache preserved)"
            
            echo ""
            echo "✅ Deployment complete!"
          ENDSSH

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for services to start..."
          sleep 30
          
          echo ""
          echo "📊 Checking deployment status..."
          
          ssh ec2-deploy bash << 'ENDSSH'
            cd /home/ubuntu/goondvr
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🐳 Container Status:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            sudo docker compose ps
            
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "💾 Disk Usage:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            df -h / | grep -E "Filesystem|/dev"
            
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🐳 Docker System Usage:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            sudo docker system df
            
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "⚙️  GoFile Upload Status:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Check and fix settings
            if [ ! -f conf/settings.json ]; then
              echo "⚠️  conf/settings.json not found! Creating with defaults..."
              mkdir -p conf
              cat > conf/settings.json <<'SETTINGS'
{
  "cookies": "",
  "user_agent": "",
  "enable_gofile_upload": true,
  "enable_supabase": true,
  "turboviplay_api_key": "",
  "voesx_api_key": "",
  "streamtape_login": "",
  "streamtape_api_key": "",
  "supabase_url": "",
  "supabase_api_key": "",
  "discord_webhook_url": "",
  "finalize_mode": "remux",
  "ffmpeg_container": "mp4",
  "ffmpeg_encoder": "libx264",
  "ffmpeg_quality": 18,
  "ffmpeg_preset": "slow",
  "disk_warning_percent": 80,
  "disk_critical_percent": 90
}
SETTINGS
              echo "✅ Created conf/settings.json"
              sudo docker restart goondvr
              sleep 5
            fi
            
            # Verify GoFile setting
            if grep -q '"enable_gofile_upload": true' conf/settings.json; then
              echo "✅ GoFile upload is ENABLED in conf/settings.json"
            elif grep -q '"enable_gofile_upload": false' conf/settings.json; then
              echo "⚠️  GoFile upload is DISABLED - Enabling now..."
              sed -i 's/"enable_gofile_upload": false/"enable_gofile_upload": true/g' conf/settings.json
              sudo docker restart goondvr
              sleep 5
              echo "✅ GoFile upload enabled and container restarted"
            elif ! grep -q "enable_gofile_upload" conf/settings.json; then
              echo "⚠️  enable_gofile_upload field missing - Adding now..."
              # Add before the last closing brace
              sed -i 's/}$/,\n  "enable_gofile_upload": true\n}/' conf/settings.json
              sudo docker restart goondvr
              sleep 5
              echo "✅ GoFile upload field added and container restarted"
            fi
            
            echo ""
            echo "📄 Current settings.json (relevant fields):"
            grep -E "enable_gofile_upload|enable_supabase|turboviplay|voesx|streamtape" conf/settings.json || echo "No upload settings found"
            
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📋 Application Logs (last 15 lines):"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            sudo docker logs --tail 15 goondvr
            
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🌐 Application URL:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            PUBLIC_IP=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4 2>/dev/null || echo "${{ secrets.EC2_HOST }}")
            echo "http://${PUBLIC_IP}:8080"
          ENDSSH

      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up SSH keys..."
          rm -f ~/.ssh/ec2-key.pem ~/.ssh/config
          echo "✅ Cleanup complete"

      - name: Deployment summary
        if: success()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ DEPLOYMENT SUCCESSFUL!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🌐 Access your application:"
          echo "   http://${{ secrets.EC2_HOST }}:8080"
          echo ""
          echo "📊 Next steps:"
          echo "   • Add channels via web UI"
          echo "   • Monitor logs: docker compose logs -f"
          echo "   • Check disk usage: df -h"
          echo "   • Verify GoFile upload in Settings"
          echo ""
          echo "⚙️  Default Settings:"
          echo "   • Max Duration: 45 minutes (auto-split)"
          echo "   • GoFile Upload: Enabled"
          echo "   • Multi-host: GoFile + TurboViPlay + VOE.sx + Streamtape"
          echo ""

