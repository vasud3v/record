name: Deploy to EC2

on:
  workflow_dispatch:  # Manual trigger only (requires secrets setup)

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check secrets
        run: |
          echo "Checking secrets configuration..."
          
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "❌ ERROR: EC2_SSH_KEY secret is not set!"
            exit 1
          else
            echo "✅ EC2_SSH_KEY is set"
          fi
          
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "❌ ERROR: EC2_HOST secret is not set!"
            exit 1
          else
            echo "✅ EC2_HOST is set: ${{ secrets.EC2_HOST }}"
          fi
          
          echo ""
          echo "All secrets configured correctly!"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2-key.pem
          chmod 600 ~/.ssh/ec2-key.pem
          
          # Add EC2 host to known_hosts
          EC2_HOST="${{ secrets.EC2_HOST }}"
          if [ -z "$EC2_HOST" ]; then
            echo "❌ ERROR: EC2_HOST secret is empty!"
            exit 1
          fi
          
          echo "Adding $EC2_HOST to known_hosts..."
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>&1 || {
            echo "⚠️ ssh-keyscan failed, adding host key manually..."
            ssh-keyscan "$EC2_HOST" >> ~/.ssh/known_hosts 2>&1
          }

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/ec2-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/ubuntu/goondvr
            
            echo "📥 Pulling latest changes..."
            git fetch origin
            git reset --hard origin/main
            git pull origin main
            
            echo "🐳 Rebuilding containers..."
            sudo docker compose down
            sudo docker compose up -d --build
            
            echo "🧹 Cleaning build cache..."
            sudo docker builder prune -af
            
            echo "✅ Deployment complete!"
            sudo docker compose ps
          EOF

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for services to be healthy..."
          sleep 30
          
          ssh -i ~/.ssh/ec2-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/ubuntu/goondvr
            
            echo "📊 Container Status:"
            sudo docker compose ps
            
            echo ""
            echo "💾 Disk Usage:"
            df -h /
            
            echo ""
            echo "🐳 Docker Usage:"
            sudo docker system df
          EOF

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/ec2-key.pem
