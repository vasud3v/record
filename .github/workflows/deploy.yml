name: Deploy to EC2

on:
  workflow_dispatch:  # Manual trigger only (requires secrets setup)

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check secrets
        run: |
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ] || [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "❌ ERROR: GitHub secrets not configured!"
            echo ""
            echo "Please add these secrets to your repository:"
            echo "1. EC2_SSH_KEY - Your EC2 private key"
            echo "2. EC2_HOST - Your EC2 IP address"
            echo ""
            echo "See .github/GITHUB_ACTIONS_SETUP.md for instructions"
            exit 1
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2-key.pem
          chmod 600 ~/.ssh/ec2-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/ec2-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/ubuntu/goondvr
            
            echo "📥 Pulling latest changes..."
            git fetch origin
            git reset --hard origin/main
            git pull origin main
            
            echo "🐳 Rebuilding containers..."
            sudo docker compose down
            sudo docker compose up -d --build
            
            echo "🧹 Cleaning build cache..."
            sudo docker builder prune -af
            
            echo "✅ Deployment complete!"
            sudo docker compose ps
          EOF

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for services to be healthy..."
          sleep 30
          
          ssh -i ~/.ssh/ec2-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/ubuntu/goondvr
            
            echo "📊 Container Status:"
            sudo docker compose ps
            
            echo ""
            echo "💾 Disk Usage:"
            df -h /
            
            echo ""
            echo "🐳 Docker Usage:"
            sudo docker system df
          EOF

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/ec2-key.pem
