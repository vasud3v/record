name: Continuous Recording (24/7) with Web UI

on:
  # Run every 5 hours to ensure 24/7 coverage
  schedule:
    - cron: '0 0 * * *'    # 00:00 UTC
    - cron: '0 5 * * *'    # 05:00 UTC
    - cron: '0 10 * * *'   # 10:00 UTC
    - cron: '0 15 * * *'   # 15:00 UTC
    - cron: '0 20 * * *'   # 20:00 UTC
  
  # Allow manual trigger
  workflow_dispatch:
  
  # Auto-start on push (optional)
  push:
    branches: [ main, master ]

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5 hours (300 minutes)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq
      
      - name: Create required directories
        run: |
          mkdir -p videos/completed
          mkdir -p database
          mkdir -p conf
      
      - name: Create settings.json from secrets
        run: |
          cat > settings.json << 'EOF'
          ${{ secrets.SETTINGS_JSON }}
          EOF
      
      - name: Create channels.json from secrets (if exists)
        run: |
          if [ -n "${{ secrets.CHANNELS_JSON }}" ]; then
            cat > conf/channels.json << 'EOF'
          ${{ secrets.CHANNELS_JSON }}
          EOF
          fi
      
      - name: Build application
        run: go build -o goondvr .
      
      - name: Install Cloudflare Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
      
      - name: Start application in background
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TURBOVIPLAY_API_KEY: ${{ secrets.TURBOVIPLAY_API_KEY }}
          VOESX_API_KEY: ${{ secrets.VOESX_API_KEY }}
          STREAMTAPE_LOGIN: ${{ secrets.STREAMTAPE_LOGIN }}
          STREAMTAPE_API_KEY: ${{ secrets.STREAMTAPE_API_KEY }}
        run: |
          echo "🚀 Starting recorder at $(date)"
          ./goondvr --port 8080 --enable-gofile-upload > recording.log 2>&1 &
          APP_PID=$!
          echo $APP_PID > app.pid
          
          # Wait for app to start
          sleep 5
          
          # Check if app is running
          if ps -p $APP_PID > /dev/null; then
            echo "✅ Application started successfully (PID: $APP_PID)"
          else
            echo "❌ Application failed to start"
            cat recording.log
            exit 1
          fi
      
      - name: Start Cloudflare Tunnel
        run: |
          echo "🌐 Starting Cloudflare Tunnel..."
          cloudflared tunnel --url http://localhost:8080 > tunnel.log 2>&1 &
          TUNNEL_PID=$!
          echo $TUNNEL_PID > tunnel.pid
          
          # Wait for tunnel to establish and get URL
          echo "⏳ Waiting for tunnel URL..."
          TUNNEL_URL=""
          for i in {1..60}; do
            if [ -f tunnel.log ]; then
              # Check for the URL in the log file
              TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
              if [ -n "$TUNNEL_URL" ]; then
                break
              fi
            fi
            sleep 2
          done
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                    🌐 WEB UI ACCESS                        ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          
          if [ -n "$TUNNEL_URL" ]; then
            echo "✅ Your dashboard is now accessible at:"
            echo ""
            echo "   $TUNNEL_URL"
            echo ""
            echo "📱 This URL is public and works from anywhere!"
            echo "⏰ Valid for 5 hours (until workflow ends)"
            echo "🔄 New URL will be generated on next run"
            echo ""
            echo "💡 TIP: Bookmark this URL for the next 5 hours!"
          else
            echo "⚠️ Tunnel URL not ready yet. Checking logs..."
            echo ""
            cat tunnel.log
            echo ""
            echo "⏳ The URL should appear in the next step's logs"
          fi
          echo ""
          
          # Show channel info
          if [ -f "conf/channels.json" ]; then
            ACTIVE_CHANNELS=$(jq '[.[] | select(.is_paused == false)] | length' conf/channels.json 2>/dev/null || echo "0")
            echo "📺 Monitoring $ACTIVE_CHANNELS active channels"
          fi
          echo ""
          echo "⏰ Recording session will run for 5 hours"
          echo ""
      
      - name: Keep running for 5 hours
        run: |
          echo "🔄 Keeping session alive..."
          echo ""
          
          # Try to get tunnel URL again if not found earlier
          sleep 10
          TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
          
          if [ -n "$TUNNEL_URL" ]; then
            echo "╔════════════════════════════════════════════════════════════╗"
            echo "║              🌐 DASHBOARD URL (COPY THIS!)                ║"
            echo "╚════════════════════════════════════════════════════════════╝"
            echo ""
            echo "   $TUNNEL_URL"
            echo ""
            echo "📱 Open this URL in your browser to access the dashboard!"
            echo ""
          else
            echo "⏳ Still waiting for tunnel URL..."
            echo "Latest tunnel log:"
            tail -10 tunnel.log
            echo ""
          fi
          
          # Monitor for 5 hours
          END_TIME=$(($(date +%s) + 18000))  # 5 hours = 18000 seconds
          LAST_URL_DISPLAY=0
          
          while [ $(date +%s) -lt $END_TIME ]; do
            CURRENT_TIME=$(date +%s)
            
            # Check if app is still running
            if [ -f app.pid ]; then
              APP_PID=$(cat app.pid)
              if ! ps -p $APP_PID > /dev/null; then
                echo "⚠️ Application stopped unexpectedly!"
                echo "Last 50 lines of log:"
                tail -50 recording.log
                break
              fi
            fi
            
            # Show status every 30 minutes
            REMAINING=$((END_TIME - CURRENT_TIME))
            if [ $((REMAINING % 1800)) -lt 60 ] && [ $((CURRENT_TIME - LAST_URL_DISPLAY)) -gt 1700 ]; then
              HOURS=$((REMAINING / 3600))
              MINUTES=$(((REMAINING % 3600) / 60))
              echo ""
              echo "⏰ Time remaining: ${HOURS}h ${MINUTES}m"
              
              # Try to get and show tunnel URL
              TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
              if [ -n "$TUNNEL_URL" ]; then
                echo "🌐 Dashboard: $TUNNEL_URL"
              else
                echo "⏳ Tunnel URL: Checking logs..."
                tail -5 tunnel.log
              fi
              
              LAST_URL_DISPLAY=$CURRENT_TIME
            fi
            
            sleep 60
          done
          
          echo ""
          echo "✅ 5-hour session completed at $(date)"
          echo "🛑 Stopping services..."
          
          # Stop application
          if [ -f app.pid ]; then
            kill $(cat app.pid) 2>/dev/null || true
          fi
          
          # Stop tunnel
          if [ -f tunnel.pid ]; then
            kill $(cat tunnel.pid) 2>/dev/null || true
          fi
      
      - name: Show session logs
        if: always()
        run: |
          echo "📋 Last 100 lines of recording log:"
          tail -100 recording.log || echo "No logs found"
      
      - name: Upload recordings (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recordings-${{ github.run_number }}
          path: |
            videos/**/*.mp4
            videos/**/*.ts
            database/**/*.json
            recording.log
            tunnel.log
          retention-days: 1
          if-no-files-found: ignore
      
      - name: Show statistics
        if: always()
        run: |
          echo ""
          echo "📊 Session Statistics:"
          echo "====================="
          echo "Duration: 5 hours"
          echo ""
          echo "Disk usage:"
          df -h
          echo ""
          echo "Recordings:"
          find videos -type f \( -name "*.mp4" -o -name "*.ts" \) 2>/dev/null | wc -l | xargs echo "Total files:"
          find videos -type f \( -name "*.mp4" -o -name "*.ts" \) -exec du -ch {} + 2>/dev/null | tail -1 || echo "No recordings"
          echo ""
          echo "Database entries:"
          find database -type f -name "*.json" 2>/dev/null | wc -l | xargs echo "Total JSON files:"
      
      - name: Cleanup
        if: always()
        run: |
          echo ""
          echo "✅ Workflow completed"
          echo "🔄 Next run will start automatically in ~5 hours"
          echo "🌐 A new dashboard URL will be generated on next run"
