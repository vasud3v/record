name: 24/7 Recorder

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: 'Recording duration in hours'
        default: '5'
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/recorder.yml'

concurrency:
  group: recorder-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h — 1h buffer over 5h recording
    
    # Add resource limits to prevent runner starvation
    env:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create directories
        run: |
          mkdir -p videos/completed database conf emergency-backup
          echo "[INFO] Disk space:"; df -h /

      - name: Verify Supabase credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_API_KEY" ]; then
            echo "[ERROR] Supabase credentials not configured"; exit 1
          fi
          echo "[SUCCESS] Supabase credentials found"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Byparr (Cloudflare bypass)
        continue-on-error: false  # Changed to false so we catch Byparr failures
        run: |
          docker network create recorder-network 2>/dev/null || true
          
          echo "📥 Pulling Byparr image..."
          docker pull ghcr.io/thephaseless/byparr:latest
          
          echo "🚀 Starting Byparr container..."
          docker run -d --name byparr --network recorder-network -p 8191:8191 \
            --memory="1.5g" \
            --memory-swap="1.5g" \
            -e HOST=0.0.0.0 -e PORT=8191 -e TIMEOUT=180 -e LOG_LEVEL=INFO \
            ghcr.io/thephaseless/byparr:latest
          
          echo "⏳ Waiting for Byparr to be ready..."
          BYPARR_READY=false
          for i in $(seq 1 90); do  # Increased from 60 to 90 (3 minutes)
            # Check if container is still running
            if ! docker ps --format '{{.Names}}' | grep -q '^byparr$'; then
              echo "❌ Byparr container stopped unexpectedly!"
              docker logs byparr
              exit 1
            fi
            
            # Try to connect to Byparr API with POST (GET returns 405)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
              -X POST http://localhost:8191/v1 \
              -H "Content-Type: application/json" \
              -d '{"cmd":"sessions.list"}' 2>/dev/null || echo "000")
            
            # 200 = success, 400 = bad request but API is responding
            # 500 = server error (browser engine not ready yet)
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "400" ]; then
              echo "✅ Byparr is ready after $((i * 2)) seconds (HTTP $HTTP_CODE)"
              BYPARR_READY=true
              break
            fi
            
            if [ $((i % 15)) -eq 0 ]; then
              echo "⏳ Still waiting for Byparr... ($i/90 attempts, last HTTP: $HTTP_CODE)"
              if [ "$HTTP_CODE" = "500" ]; then
                echo "   (HTTP 500 = browser engine still initializing...)"
              fi
            fi
            
            sleep 2
          done
          
          if [ "$BYPARR_READY" = false ]; then
            echo "❌ Byparr never became ready after 180 seconds"
            echo "Container logs:"
            docker logs byparr --tail 50
            exit 1
          fi
          
          # Test Byparr with a simple sessions.list command (faster than full request)
          echo "🔍 Testing Byparr functionality..."
          TEST_RESPONSE=$(curl -s -X POST http://localhost:8191/v1 \
            -H "Content-Type: application/json" \
            -d '{"cmd":"sessions.list"}' \
            --max-time 10 2>&1)
          
          TEST_STATUS=$?
          
          if [ $TEST_STATUS -eq 0 ] && echo "$TEST_RESPONSE" | grep -q '"status"'; then
            echo "✅ Byparr test successful"
            echo "Response: $TEST_RESPONSE"
          else
            echo "⚠️  Byparr test returned unexpected response (exit code: $TEST_STATUS):"
            echo "$TEST_RESPONSE" | head -20
            
            # Check if it's a 500 error
            if echo "$TEST_RESPONSE" | grep -q "500"; then
              echo ""
              echo "💡 Byparr is returning 500 errors - this usually means:"
              echo "   • Browser engine not fully initialized"
              echo "   • Memory constraints"
              echo "   • Invalid request format"
              echo ""
              echo "Checking container logs for more details..."
              docker logs byparr --tail 30
              echo ""
              echo "❌ Byparr is not functioning properly, exiting..."
              exit 1
            fi
            
            echo "Continuing anyway - may work for actual requests"
          fi

      - name: Build and start recorder
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -t goondvr:latest --load .

          BYPARR_URL=""
          docker ps | grep -q byparr && BYPARR_URL="http://byparr:8191/v1"
          EXTRA_ARGS=""
          [ -n "$BYPARR_URL" ] && EXTRA_ARGS="-e FLARESOLVERR_URL=$BYPARR_URL"

          # Add memory limits to prevent OOM issues
          # GitHub Actions runners have ~7GB RAM, limit container to 4GB to leave room for system
          docker run -d --name goondvr \
            --restart=unless-stopped \
            --network recorder-network \
            -p 8080:8080 \
            --memory="4g" \
            --memory-swap="4g" \
            --oom-kill-disable=false \
            $EXTRA_ARGS \
            -e SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            -e SUPABASE_API_KEY="${{ secrets.SUPABASE_API_KEY }}" \
            -v $(pwd)/videos:/usr/src/app/videos \
            goondvr:latest --port 8080 --enable-gofile-upload --debug

          # Wait until port 8080 is actually accepting connections
          echo "⏳ Waiting for app on port 8080..."
          APP_STARTED=false
          for i in $(seq 1 45); do
            # Check if container is still running
            if ! docker ps --format '{{.Names}}' | grep -q '^goondvr$'; then
              echo "❌ Container stopped unexpectedly!"
              docker logs goondvr
              exit 1
            fi
            
            # Try to connect to the app
            if curl -sf --max-time 5 http://localhost:8080 > /dev/null 2>&1; then
              echo "✅ App ready after $((i * 2)) seconds"
              APP_STARTED=true
              break
            fi
            
            # Show progress every 5 attempts
            if [ $((i % 5)) -eq 0 ]; then
              echo "⏳ Still waiting... ($i/45 attempts)"
            fi
            
            sleep 2
          done
          
          if [ "$APP_STARTED" = false ]; then
            echo "❌ App never came up after 90 seconds"
            echo "Container status:"; docker ps -a | grep goondvr
            echo "Container logs:"; docker logs goondvr
            exit 1
          fi

          # Additional verification - check if API endpoint works
          echo "🔍 Verifying API endpoint..."
          if curl -sf --max-time 5 http://localhost:8080/api/stats > /dev/null 2>&1; then
            echo "✅ API endpoint is responding"
          else
            echo "⚠️  Main page works but API may not be fully ready"
          fi

          echo "📋 Container logs (last 50 lines):"
          docker logs goondvr 2>&1 | tail -50

      - name: Install and start Cloudflare Tunnel
        id: cloudflare_tunnel
        continue-on-error: true
        run: |
          # Double-check app is responding before creating tunnel
          echo "🔍 Final verification that app is responding..."
          APP_READY=false
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "✅ App confirmed ready"
              APP_READY=true
              break
            fi
            echo "⏳ Waiting for app... attempt $i/10"
            sleep 3
          done

          if [ "$APP_READY" = false ]; then
            echo "❌ App is not responding on port 8080!"
            echo "Container status:"; docker ps -a | grep goondvr
            echo "Container logs:"; docker logs goondvr --tail 100
            exit 1
          fi

          # Install cloudflared
          curl -L --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

          # Function to create and verify tunnel
          create_tunnel() {
            local attempt=$1
            echo ""
            echo "🚀 Starting Cloudflare Tunnel (Attempt $attempt)..."
            
            # Kill any existing tunnel
            pkill -f cloudflared 2>/dev/null || true
            sleep 2
            
            # Start new tunnel
            rm -f tunnel.log
            cloudflared tunnel --url http://localhost:8080 --no-autoupdate > tunnel.log 2>&1 &
            TUNNEL_PID=$!
            echo $TUNNEL_PID > tunnel.pid
            echo "Tunnel PID: $TUNNEL_PID"

            # Wait for tunnel URL to appear
            echo "⏳ Waiting for tunnel URL..."
            local TUNNEL_URL=""
            for i in $(seq 1 18); do
              if [ -f tunnel.log ]; then
                TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
                if [ -n "$TUNNEL_URL" ]; then
                  echo "✅ Tunnel URL found: $TUNNEL_URL"
                  break
                fi
              fi
              sleep 5
            done

            if [ -z "$TUNNEL_URL" ]; then
              echo "❌ Failed to get tunnel URL"
              cat tunnel.log 2>/dev/null || true
              return 1
            fi

            # CRITICAL: Verify tunnel is actually accessible
            echo "🔍 Verifying tunnel accessibility..."
            local VERIFIED=false
            
            # First, verify the backend is still responding
            echo "Checking backend app on localhost:8080..."
            if ! curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "⚠️  Backend app not responding! Tunnel will fail."
              docker logs goondvr --tail 50 || true
            fi
            
            for i in $(seq 1 20); do
              echo "Testing tunnel (attempt $i/20)..."
              
              # Test with curl - check HTTP status code
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 15 "$TUNNEL_URL" 2>&1 | tail -1)
              
              # Clean up the HTTP code (remove any extra characters)
              HTTP_CODE=$(echo "$HTTP_CODE" | grep -oE '[0-9]{3}' | head -1)
              
              if [ -z "$HTTP_CODE" ]; then
                # Try with verbose output to see what's happening
                if [ $i -eq 5 ] || [ $i -eq 10 ]; then
                  echo "Debug: Testing with verbose output..."
                  curl -v --connect-timeout 5 --max-time 10 "$TUNNEL_URL" 2>&1 | head -20 || true
                fi
                echo "⏳ Connection timeout or DNS not resolved yet..."
                sleep 5
                continue
              fi
              
              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ Tunnel is VERIFIED ACCESSIBLE (HTTP 200)"
                VERIFIED=true
                
                # Double-check API endpoint
                API_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "$TUNNEL_URL/api/stats" 2>&1 | tail -1 | grep -oE '[0-9]{3}' | head -1)
                if [ "$API_CODE" = "200" ]; then
                  echo "✅ API endpoint also verified (HTTP 200)"
                else
                  echo "⚠️  API returned HTTP ${API_CODE:-'no response'} (main page works though)"
                fi
                
                break
              elif [ "$HTTP_CODE" = "502" ] || [ "$HTTP_CODE" = "503" ] || [ "$HTTP_CODE" = "504" ]; then
                echo "⚠️  Gateway error (HTTP $HTTP_CODE) - backend not responding"
                # Check if backend is still alive
                if ! curl -sf http://localhost:8080 > /dev/null 2>&1; then
                  echo "❌ Backend app died! Cannot proceed."
                  return 1
                fi
              elif [ "$HTTP_CODE" = "000" ]; then
                echo "⚠️  HTTP 000 (connection failed - DNS propagation or network issue)"
              else
                echo "⚠️  HTTP $HTTP_CODE (waiting for 200...)"
              fi
              
              sleep 5
            done

            if [ "$VERIFIED" = false ]; then
              echo "❌ Tunnel URL exists but is NOT accessible after 100 seconds"
              echo "Last HTTP code received: ${HTTP_CODE:-'none'}"
              
              # Additional diagnostics
              echo ""
              echo "🔍 Running diagnostics..."
              echo "1. DNS resolution test:"
              nslookup $(echo "$TUNNEL_URL" | sed 's|https://||' | sed 's|/.*||') || true
              
              echo ""
              echo "2. Ping test:"
              ping -c 2 $(echo "$TUNNEL_URL" | sed 's|https://||' | sed 's|/.*||') || true
              
              echo ""
              echo "3. Backend app test:"
              curl -v http://localhost:8080 2>&1 | head -20 || true
              
              echo ""
              echo "This tunnel is unusable - will retry with new tunnel"
              kill $TUNNEL_PID 2>/dev/null || true
              return 1
            fi

            # Success - export the URL
            echo "$TUNNEL_URL" > tunnel_url.txt
            echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
            echo "TUNNEL_PID=$TUNNEL_PID" >> $GITHUB_ENV
            
            return 0
          }

          # Try up to 2 times to get a working tunnel (reduced from 3)
          # Most failures are DNS propagation, not actual tunnel issues
          TUNNEL_SUCCESS=false
          for attempt in 1 2; do
            if create_tunnel $attempt; then
              TUNNEL_SUCCESS=true
              break
            else
              echo "❌ Attempt $attempt failed"
              if [ $attempt -lt 2 ]; then
                echo "⏳ Waiting 10 seconds before retry..."
                sleep 10
              fi
            fi
          done

          if [ "$TUNNEL_SUCCESS" = false ]; then
            echo "⚠️  Failed to verify tunnel accessibility after 2 attempts"
            echo "⚠️  This is usually due to Cloudflare DNS propagation delays"
            echo "⚠️  Proceeding anyway - tunnel should become accessible in 1-2 minutes"
            
            # Get the last tunnel URL even if not verified
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            
            if [ -z "$TUNNEL_URL" ]; then
              echo "❌ No tunnel URL found at all - cannot proceed"
              exit 1
            fi
            
            echo "$TUNNEL_URL" > tunnel_url.txt
            echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
            
            echo ""
            echo "╔════════════════════════════════════════════════════════════╗"
            echo "║                    🌐 WEB UI ACCESS                        ║"
            echo "╚════════════════════════════════════════════════════════════╝"
            echo ""
            echo "   $TUNNEL_URL"
            echo ""
            echo "   Status: ⏳ PROPAGATING (wait 2-3 minutes then try accessing)"
            echo ""
            echo "   The tunnel URL exists but DNS may not be propagated yet."
            echo "   Try accessing it in 2-3 minutes."
            echo ""
          else
            # Read the verified tunnel URL
            TUNNEL_URL=$(cat tunnel_url.txt)

            echo ""
            echo "╔════════════════════════════════════════════════════════════╗"
            echo "║                    🌐 WEB UI ACCESS                        ║"
            echo "╚════════════════════════════════════════════════════════════╝"
            echo ""
            echo "   $TUNNEL_URL"
            echo ""
            echo "   Status: ✅ VERIFIED ACCESSIBLE"
            echo ""
          fi

          # Save tunnel URL to Supabase
          echo "💾 Saving tunnel URL to Supabase..."
          SAVE_SUCCESS=false
          
          for attempt in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/supabase_response.txt \
              -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/tunnel_sessions" \
              -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d "{\"run_id\": ${{ github.run_number }}, \"url\": \"$TUNNEL_URL\", \"started_at\": \"$(date -u +%FT%TZ)\", \"is_active\": true}")
            
            if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ]; then
              echo "✅ Tunnel URL saved to Supabase (HTTP $HTTP_CODE)"
              SAVE_SUCCESS=true
              break
            else
              echo "⚠️  Attempt $attempt/5: Failed to save URL (HTTP $HTTP_CODE)"
              cat /tmp/supabase_response.txt 2>/dev/null || true
              [ $attempt -lt 5 ] && sleep 3
            fi
          done
          
          if [ "$SAVE_SUCCESS" = false ]; then
            echo "⚠️  Could not save URL to Supabase (table may not exist)"
            echo "You can still access the UI using the URL above"
          fi

          # Monitor tunnel health and recreate if it becomes inaccessible
          # Store the monitoring PID so we can kill it later
          (
            DURATION_HOURS="${{ github.event.inputs.duration_hours }}"
            DURATION_HOURS="${DURATION_HOURS:-5}"
            MONITOR_END_TIME=$(($(date +%s) + DURATION_HOURS * 3600 + 300))  # Add 5 min buffer
            
            while [ $(date +%s) -lt $MONITOR_END_TIME ]; do
              sleep 120  # Check every 2 minutes
              
              # Check if process is alive
              if ! ps -p $TUNNEL_PID > /dev/null 2>&1; then
                echo "⚠️  Tunnel process died!"
                
                # Try to create new tunnel
                if create_tunnel "auto-restart"; then
                  TUNNEL_URL=$(cat tunnel_url.txt)
                  echo "✅ New tunnel created: $TUNNEL_URL"
                  
                  # Update Supabase with new URL
                  curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/tunnel_sessions" \
                    -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
                    -H "Content-Type: application/json" \
                    -H "Prefer: return=minimal" \
                    -d "{\"run_id\": ${{ github.run_number }}, \"url\": \"$TUNNEL_URL\", \"started_at\": \"$(date -u +%FT%TZ)\", \"is_active\": true}" \
                    > /dev/null 2>&1 || true
                fi
                continue
              fi
              
              # Check if tunnel is still accessible
              CURRENT_URL=$(cat tunnel_url.txt 2>/dev/null || echo "")
              if [ -n "$CURRENT_URL" ]; then
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$CURRENT_URL" 2>/dev/null || echo "000")
                
                if [ "$HTTP_CODE" != "200" ]; then
                  echo "⚠️  Tunnel not accessible (HTTP $HTTP_CODE), recreating..."
                  
                  # Kill old tunnel and create new one
                  kill $TUNNEL_PID 2>/dev/null || true
                  
                  if create_tunnel "auto-restart"; then
                    TUNNEL_URL=$(cat tunnel_url.txt)
                    echo "✅ New tunnel created: $TUNNEL_URL"
                    
                    # Update Supabase with new URL
                    curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/tunnel_sessions" \
                      -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
                      -H "Content-Type: application/json" \
                      -H "Prefer: return=minimal" \
                      -d "{\"run_id\": ${{ github.run_number }}, \"url\": \"$TUNNEL_URL\", \"started_at\": \"$(date -u +%FT%TZ)\", \"is_active\": true}" \
                      > /dev/null 2>&1 || true
                  fi
                fi
              fi
            done
            echo "✅ Tunnel monitor exiting gracefully (time limit reached)"
          ) &
          MONITOR_PID=$!
          echo $MONITOR_PID > tunnel_monitor.pid
          echo "Tunnel monitor PID: $MONITOR_PID"

      - name: Fallback to ngrok if Cloudflare fails
        if: steps.cloudflare_tunnel.outcome == 'failure'
        run: |
          echo "⚠️  Cloudflare Tunnel failed, trying ngrok as fallback..."
          
          # Install ngrok
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok -y
          
          # Start ngrok (no auth required for basic usage)
          ngrok http 8080 --log=stdout > ngrok.log 2>&1 &
          NGROK_PID=$!
          echo $NGROK_PID > ngrok.pid
          
          # Wait for ngrok URL
          echo "⏳ Waiting for ngrok URL..."
          TUNNEL_URL=""
          for i in $(seq 1 30); do
            # Try to get URL from ngrok API
            TUNNEL_URL=$(curl -s http://localhost:4040/api/tunnels | grep -oP 'https://[a-zA-Z0-9-]+\.ngrok-free\.app' | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ ngrok URL found: $TUNNEL_URL"
              break
            fi
            sleep 2
          done
          
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get ngrok URL"
            cat ngrok.log
            exit 1
          fi
          
          # Test accessibility
          echo "🔍 Testing ngrok tunnel..."
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$TUNNEL_URL" || echo "000")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ ngrok tunnel is accessible"
          else
            echo "⚠️  ngrok returned HTTP $HTTP_CODE (may need to click through warning page)"
          fi
          
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          echo "$TUNNEL_URL" > tunnel_url.txt
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                    🌐 WEB UI ACCESS (ngrok)                ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "   $TUNNEL_URL"
          echo ""
          echo "   ⚠️  Note: ngrok free tier shows a warning page first"
          echo "   Click 'Visit Site' to access the UI"
          echo ""
          
          # Save to Supabase
          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/tunnel_sessions" \
            -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"run_id\": ${{ github.run_number }}, \"url\": \"$TUNNEL_URL\", \"started_at\": \"$(date -u +%FT%TZ)\", \"is_active\": true}" \
            > /dev/null 2>&1 || true

      - name: Create GitHub Actions Summary
        if: always()
        run: |
          echo "# 🌐 GoOnDVR Web UI Access" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "$TUNNEL_URL" ]; then
            echo "## ✅ Tunnel Active" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Access your recorder at:**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🔗 [$TUNNEL_URL]($TUNNEL_URL)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Run ID:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Started:** $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)" >> $GITHUB_STEP_SUMMARY
            echo "- **Duration:** ${{ github.event.inputs.duration_hours || '5' }} hours" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ⚠️ **Note:** This URL is only active while the workflow is running. It will expire when the run completes." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Tunnel Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The tunnel could not be established. Check the logs above for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Record for 5 hours
        run: |
          graceful_shutdown() {
            echo "⚠️  Graceful shutdown initiated..."
            
            # Kill background processes first
            if [ -f tunnel_monitor.pid ]; then
              MONITOR_PID=$(cat tunnel_monitor.pid)
              kill $MONITOR_PID 2>/dev/null || true
            fi
            
            echo "⚠️  Saving recordings..."
            docker exec goondvr pkill -SIGTERM -f goondvr 2>/dev/null || true
            sleep 180

            COMPLETED_COUNT=$(docker exec goondvr find /usr/src/app/videos/completed \
              -type f \( -name "*.mp4" -o -name "*.mkv" \) 2>/dev/null | wc -l || echo "0")
            if [ "$COMPLETED_COUNT" -gt 0 ]; then
              echo "📤 Uploading $COMPLETED_COUNT file(s)..."
              curl -s -X POST -m 600 http://localhost:8080/api/upload/completed || true
              sleep 60
            fi

            docker cp goondvr:/usr/src/app/videos/. emergency-backup/ 2>/dev/null || true
            CANCELLED=true
          }

          trap 'graceful_shutdown' SIGTERM SIGINT
          CANCELLED=false

          DURATION_HOURS="${{ github.event.inputs.duration_hours }}"
          DURATION_HOURS="${DURATION_HOURS:-5}"
          END_TIME=$(($(date +%s) + DURATION_HOURS * 3600))
          LAST_CLEANUP=0
          LAST_HEARTBEAT=0
          RESTART_COUNT=0
          MAX_RESTARTS=3

          while [ $(date +%s) -lt $END_TIME ] && [ "$CANCELLED" = false ]; do
            # Check if container is still running
            if ! docker ps --format '{{.Names}}' | grep -q '^goondvr$'; then
              echo "⚠️  Container stopped unexpectedly!"
              docker logs --tail 100 goondvr
              
              # Check restart limit
              if [ $RESTART_COUNT -ge $MAX_RESTARTS ]; then
                echo "❌ Maximum restart attempts ($MAX_RESTARTS) reached, exiting"
                break
              fi
              
              RESTART_COUNT=$((RESTART_COUNT + 1))
              echo "⚠️  Attempting to restart container (attempt $RESTART_COUNT/$MAX_RESTARTS)..."
              
              # Try to restart the container
              docker start goondvr 2>/dev/null || {
                echo "❌ Failed to restart container, exiting"
                break
              }
              
              # Wait for app to be ready
              for i in $(seq 1 30); do
                if curl -sf http://localhost:8080 > /dev/null 2>&1; then
                  echo "✅ Container restarted successfully"
                  break
                fi
                if [ "$i" -eq 30 ]; then
                  echo "❌ Container failed to restart properly"
                  break
                fi
                sleep 2
              done
            fi

            CURRENT_TIME=$(date +%s)
            
            # Monitor Docker container memory usage
            CONTAINER_MEM=$(docker stats --no-stream --format "{{.MemPerc}}" goondvr 2>/dev/null | sed 's/%//' || echo "0")
            CONTAINER_MEM=${CONTAINER_MEM%.*}  # Remove decimal part
            
            # Monitor system resources
            MEMORY_USED=$(free | awk '/Mem:/ {printf "%.0f", $3/$2 * 100}')
            
            # If container is using >85% of its limit or system memory >85%, take action
            if [ "$CONTAINER_MEM" -gt 85 ] || [ "$MEMORY_USED" -gt 85 ]; then
              echo "⚠️  High memory usage detected - Container: ${CONTAINER_MEM}%, System: ${MEMORY_USED}%"
              
              # First, try to trigger upload to free up memory
              echo "📤 Triggering emergency upload to free memory..."
              curl -s -X POST -m 60 http://localhost:8080/api/upload/completed > /dev/null 2>&1 || true
              
              # Clean up Docker resources
              echo "🧹 Running Docker cleanup..."
              docker system prune -f 2>/dev/null || true
              
              # If still critical after cleanup, restart the container
              sleep 10
              MEMORY_AFTER=$(free | awk '/Mem:/ {printf "%.0f", $3/$2 * 100}')
              if [ "$MEMORY_AFTER" -gt 90 ]; then
                echo "❌ Memory still critical (${MEMORY_AFTER}%) after cleanup - restarting container..."
                
                # Save any in-progress recordings
                docker exec goondvr pkill -SIGTERM -f goondvr 2>/dev/null || true
                sleep 30
                
                # Restart container
                docker restart goondvr
                
                # Wait for it to come back
                for i in $(seq 1 30); do
                  if curl -sf http://localhost:8080 > /dev/null 2>&1; then
                    echo "✅ Container restarted successfully"
                    break
                  fi
                  sleep 2
                done
              else
                echo "✅ Memory usage improved to ${MEMORY_AFTER}%"
              fi
            fi

            # Disk space guard — upload early if >80% used
            DISK_USED=$(df / | awk 'NR==2{print $5}' | tr -d '%')
            if [ "$DISK_USED" -gt 80 ]; then
              echo "⚠️  Disk at ${DISK_USED}%, triggering early upload..."
              curl -s -X POST -m 120 http://localhost:8080/api/upload/completed > /dev/null 2>&1 || true
            fi

            # Periodic upload every 30 min
            if [ $((CURRENT_TIME - LAST_CLEANUP)) -gt 1800 ]; then
              COMPLETED_COUNT=$(docker exec goondvr find /usr/src/app/videos/completed \
                -type f \( -name "*.mp4" -o -name "*.mkv" \) 2>/dev/null | wc -l || echo "0")
              if [ "$COMPLETED_COUNT" -gt 0 ]; then
                echo "📤 Uploading $COMPLETED_COUNT completed file(s)..."
                curl -s -X POST -m 120 http://localhost:8080/api/upload/completed > /dev/null 2>&1 &
              fi
              LAST_CLEANUP=$CURRENT_TIME
            fi

            # Heartbeat to Supabase every 5 min
            if [ $((CURRENT_TIME - LAST_HEARTBEAT)) -gt 300 ]; then
              curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/heartbeats" \
                -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d "{\"run_id\": ${{ github.run_number }}, \"timestamp\": \"$(date -u +%FT%TZ)\", \"tunnel_url\": \"$TUNNEL_URL\", \"disk_used_pct\": $DISK_USED, \"memory_used_pct\": $MEMORY_USED}" \
                > /dev/null 2>&1 || true
              LAST_HEARTBEAT=$CURRENT_TIME
            fi

            sleep 60
          done

          # Final upload
          echo "📤 Performing final upload..."
          COMPLETED_COUNT=$(docker exec goondvr find /usr/src/app/videos/completed \
            -type f \( -name "*.mp4" -o -name "*.mkv" \) 2>/dev/null | wc -l || echo "0")
          if [ "$COMPLETED_COUNT" -gt 0 ]; then
            echo "📤 Uploading $COMPLETED_COUNT final file(s)..."
            curl -s -X POST -m 300 http://localhost:8080/api/upload/completed || true
            sleep 60
          else
            echo "✅ No files to upload"
          fi

      - name: Trigger next run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Checking for pending workflow runs..."
          
          # Check if there are already queued or in-progress runs
          # Note: gh CLI doesn't support comma-separated status values, so we check each separately
          QUEUED_RUNS=$(gh run list --workflow="24/7 Recorder" --status=queued --json databaseId --jq 'length')
          IN_PROGRESS_RUNS=$(gh run list --workflow="24/7 Recorder" --status=in_progress --json databaseId --jq 'length')
          PENDING_RUNS=$((QUEUED_RUNS + IN_PROGRESS_RUNS))
          
          echo "Found $PENDING_RUNS pending/running workflow(s) (queued: $QUEUED_RUNS, in_progress: $IN_PROGRESS_RUNS)"
          
          if [ "$PENDING_RUNS" -gt 0 ]; then
            echo "✅ Next run already queued or running, skipping trigger"
          else
            echo "🔁 No pending runs found, triggering next run..."
            gh workflow run "${{ github.workflow }}" --repo "${{ github.repository }}"
            echo "✅ Next run queued"
          fi

      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Starting cleanup..."
          
          # Kill tunnel monitor first
          if [ -f tunnel_monitor.pid ]; then
            MONITOR_PID=$(cat tunnel_monitor.pid)
            echo "Stopping tunnel monitor (PID: $MONITOR_PID)..."
            kill $MONITOR_PID 2>/dev/null || true
            sleep 2
          fi
          
          # Kill tunnel process
          if [ -f tunnel.pid ]; then
            TUNNEL_PID=$(cat tunnel.pid)
            echo "Stopping tunnel (PID: $TUNNEL_PID)..."
            kill $TUNNEL_PID 2>/dev/null || true
          fi
          pkill -f cloudflared 2>/dev/null || true
          pkill -f ngrok 2>/dev/null || true
          
          # Stop Docker containers gracefully
          echo "Stopping Docker containers..."
          docker stop --time=60 goondvr byparr 2>/dev/null || true
          docker rm -f goondvr byparr 2>/dev/null || true
          docker network rm recorder-network 2>/dev/null || true
          
          # Clean up Docker resources
          echo "Cleaning up Docker resources..."
          docker system prune -af --volumes 2>/dev/null || true
          
          # Clean up files
          echo "Cleaning up files..."
          rm -rf videos/* database/* 2>/dev/null || true
          
          echo "✅ Cleanup complete"

      - name: Upload artifacts (emergency fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recordings-${{ github.run_number }}
          path: emergency-backup/
          retention-days: 30
          if-no-files-found: ignore
