name: 24/7 Recorder

on:
  schedule:
    - cron: '0 * * * *'  # Fallback safety net only
  workflow_dispatch:
    inputs:
      duration_hours:
        description: 'Recording duration in hours'
        default: '5'
  push:
    branches: [ main, master ]

concurrency:
  group: recorder
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h — 1h buffer over 5h recording

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create directories
        run: |
          mkdir -p videos/completed database conf emergency-backup
          echo "[INFO] Disk space:"; df -h /

      - name: Verify Supabase credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_API_KEY" ]; then
            echo "[ERROR] Supabase credentials not configured"; exit 1
          fi
          echo "[SUCCESS] Supabase credentials found"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Byparr (Cloudflare bypass)
        continue-on-error: true
        run: |
          docker network create recorder-network 2>/dev/null || true
          # Pre-pull Byparr in background while we continue
          docker pull ghcr.io/thephaseless/byparr:latest &
          PULL_PID=$!
          wait $PULL_PID || true
          docker run -d --name byparr --network recorder-network -p 8191:8191 \
            -e HOST=0.0.0.0 -e PORT=8191 -e TIMEOUT=180 -e LOG_LEVEL=INFO \
            ghcr.io/thephaseless/byparr:latest || true

      - name: Build and start recorder
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -t goondvr:latest --load .

          BYPARR_URL=""
          docker ps | grep -q byparr && BYPARR_URL="http://byparr:8191/v1"
          EXTRA_ARGS=""
          [ -n "$BYPARR_URL" ] && EXTRA_ARGS="-e FLARESOLVERR_URL=$BYPARR_URL"

          docker run -d --name goondvr \
            --restart=unless-stopped \
            --network recorder-network \
            -p 8080:8080 \
            $EXTRA_ARGS \
            -e SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            -e SUPABASE_API_KEY="${{ secrets.SUPABASE_API_KEY }}" \
            -v $(pwd)/videos:/usr/src/app/videos \
            goondvr:latest --port 8080 --enable-gofile-upload --debug

          # Wait until port 8080 is actually accepting connections
          echo "Waiting for app on port 8080..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "✅ App ready after ${i}x2s"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ App never came up. Container logs:"; docker logs goondvr; exit 1
            fi
            sleep 2
          done

          docker logs goondvr 2>&1 | head -50

      - name: Install and start Cloudflare Tunnel
        run: |
          curl -L --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

          cloudflared tunnel --url http://localhost:8080 > tunnel.log 2>&1 &
          echo $! > tunnel.pid

          # Wait up to 60s for tunnel URL to appear
          echo "Waiting for tunnel URL..."
          TUNNEL_URL=""
          for i in $(seq 1 12); do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            [ -n "$TUNNEL_URL" ] && break
            sleep 5
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Tunnel failed to establish. Full log:"; cat tunnel.log; exit 1
          fi

          # Verify tunnel actually proxies to the app
          echo "Verifying tunnel is reachable..."
          for i in $(seq 1 6); do
            if curl -sf --max-time 10 "$TUNNEL_URL" > /dev/null 2>&1; then
              echo "✅ Tunnel verified reachable"; break
            fi
            if [ "$i" -eq 6 ]; then
              echo "⚠️  Tunnel URL exists but may not be reachable yet (Cloudflare propagation lag)"
            fi
            sleep 5
          done

          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV

          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                    🌐 WEB UI ACCESS                        ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "   $TUNNEL_URL"
          echo ""

          # Save tunnel URL to Supabase so it's always retrievable
          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/tunnel_sessions" \
            -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"run_id\": ${{ github.run_number }}, \"url\": \"$TUNNEL_URL\", \"started_at\": \"$(date -u +%FT%TZ)\"}" \
            || echo "⚠️  Could not save URL to Supabase (table may not exist)"

      - name: Record for 5 hours
        run: |
          graceful_shutdown() {
            echo "⚠️  Saving recordings..."
            docker exec goondvr pkill -SIGTERM -f goondvr 2>/dev/null || true
            sleep 180

            COMPLETED_COUNT=$(docker exec goondvr find /usr/src/app/videos/completed \
              -type f \( -name "*.mp4" -o -name "*.mkv" \) 2>/dev/null | wc -l || echo "0")
            if [ "$COMPLETED_COUNT" -gt 0 ]; then
              echo "📤 Uploading $COMPLETED_COUNT file(s)..."
              curl -s -X POST -m 600 http://localhost:8080/api/upload/completed || true
              sleep 60
            fi

            docker cp goondvr:/usr/src/app/videos/. emergency-backup/ 2>/dev/null || true
            CANCELLED=true
          }

          trap 'graceful_shutdown' SIGTERM SIGINT
          CANCELLED=false

          DURATION_HOURS="${{ github.event.inputs.duration_hours }}"
          DURATION_HOURS="${DURATION_HOURS:-5}"
          END_TIME=$(($(date +%s) + DURATION_HOURS * 3600))
          LAST_CLEANUP=0
          LAST_HEARTBEAT=0

          while [ $(date +%s) -lt $END_TIME ] && [ "$CANCELLED" = false ]; do
            if ! docker ps | grep -q goondvr; then
              echo "⚠️  Container stopped!"; docker logs --tail 50 goondvr; break
            fi

            CURRENT_TIME=$(date +%s)

            # Disk space guard — upload early if >80% used
            DISK_USED=$(df / | awk 'NR==2{print $5}' | tr -d '%')
            if [ "$DISK_USED" -gt 80 ]; then
              echo "⚠️  Disk at ${DISK_USED}%, triggering early upload..."
              curl -s -X POST -m 120 http://localhost:8080/api/upload/completed > /dev/null 2>&1 || true
            fi

            # Periodic upload every 30 min
            if [ $((CURRENT_TIME - LAST_CLEANUP)) -gt 1800 ]; then
              COMPLETED_COUNT=$(docker exec goondvr find /usr/src/app/videos/completed \
                -type f \( -name "*.mp4" -o -name "*.mkv" \) 2>/dev/null | wc -l || echo "0")
              [ "$COMPLETED_COUNT" -gt 0 ] && \
                curl -s -X POST -m 120 http://localhost:8080/api/upload/completed > /dev/null 2>&1 &
              LAST_CLEANUP=$CURRENT_TIME
            fi

            # Heartbeat to Supabase every 5 min
            if [ $((CURRENT_TIME - LAST_HEARTBEAT)) -gt 300 ]; then
              curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/heartbeats" \
                -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d "{\"run_id\": ${{ github.run_number }}, \"timestamp\": \"$(date -u +%FT%TZ)\", \"tunnel_url\": \"$TUNNEL_URL\", \"disk_used_pct\": $DISK_USED}" \
                > /dev/null 2>&1 || true
              LAST_HEARTBEAT=$CURRENT_TIME
            fi

            sleep 60
          done

          # Final upload
          COMPLETED_COUNT=$(docker exec goondvr find /usr/src/app/videos/completed \
            -type f \( -name "*.mp4" -o -name "*.mkv" \) 2>/dev/null | wc -l || echo "0")
          [ "$COMPLETED_COUNT" -gt 0 ] && \
            curl -s -X POST -m 300 http://localhost:8080/api/upload/completed || true
          sleep 60

      - name: Trigger next run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔁 Triggering next run..."
          gh workflow run "${{ github.workflow }}" --repo "${{ github.repository }}"
          echo "✅ Next run queued"

      - name: Cleanup
        if: always()
        run: |
          docker stop --time=60 goondvr byparr 2>/dev/null || true
          docker rm -f goondvr byparr 2>/dev/null || true
          docker network rm recorder-network 2>/dev/null || true
          docker system prune -af --volumes 2>/dev/null || true
          pkill -f cloudflared 2>/dev/null || true
          rm -rf videos/* database/* 2>/dev/null || true

      - name: Upload artifacts (emergency fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recordings-${{ github.run_number }}
          path: emergency-backup/
          retention-days: 30
          if-no-files-found: ignore
