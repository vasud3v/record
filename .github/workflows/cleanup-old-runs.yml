name: Cleanup Old Workflow Runs & Artifacts

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      days_old:
        description: 'Delete runs older than (days)'
        required: true
        default: '7'
        type: choice
        options:
          - '1'
          - '3'
          - '7'
          - '14'
          - '30'
      delete_artifacts:
        description: 'Also delete artifacts?'
        required: true
        default: 'true'
        type: boolean
      confirm:
        description: 'Type "DELETE" to confirm'
        required: true
        default: ''
  
  # Optional: Run automatically every week
  # schedule:
  #   - cron: '0 0 * * 0'  # Every Sunday at midnight

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Verify confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DELETE" ]; then
            echo "❌ Confirmation failed!"
            echo "Please type 'DELETE' in the confirmation field to proceed"
            exit 1
          fi
          echo "✅ Confirmation verified"
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Delete old workflow runs
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║        🗑️  DELETING OLD WORKFLOW RUNS & ARTIFACTS         ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          
          DAYS_OLD="${{ github.event.inputs.days_old || '7' }}"
          DELETE_ARTIFACTS="${{ github.event.inputs.delete_artifacts || 'true' }}"
          
          echo "⚙️  Configuration:"
          echo "  • Delete runs older than: $DAYS_OLD days"
          echo "  • Delete artifacts: $DELETE_ARTIFACTS"
          echo ""
          
          # Calculate cutoff date
          CUTOFF_DATE=$(date -d "$DAYS_OLD days ago" -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "📅 Cutoff date: $CUTOFF_DATE"
          echo ""
          
          # Get all workflow runs older than cutoff
          echo "📋 Fetching old workflow runs..."
          RUNS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/actions/runs?per_page=100" \
            --jq ".workflow_runs[] | select(.created_at < \"$CUTOFF_DATE\") | .id")
          
          if [ -z "$RUNS" ]; then
            echo "✅ No old workflow runs found"
          else
            RUN_COUNT=$(echo "$RUNS" | wc -l)
            echo "🗑️  Found $RUN_COUNT old workflow runs to delete"
            echo ""
            
            # Delete each run
            DELETED=0
            FAILED=0
            for RUN_ID in $RUNS; do
              echo "  Deleting run #$RUN_ID..."
              if gh api \
                --method DELETE \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${{ github.repository }}/actions/runs/$RUN_ID" 2>/dev/null; then
                DELETED=$((DELETED + 1))
              else
                FAILED=$((FAILED + 1))
              fi
            done
            
            echo ""
            echo "📊 Summary:"
            echo "  ✅ Deleted: $DELETED runs"
            if [ $FAILED -gt 0 ]; then
              echo "  ⚠️  Failed: $FAILED runs"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Delete old artifacts
        if: github.event.inputs.delete_artifacts == 'true' || github.event_name == 'schedule'
        run: |
          echo ""
          echo "🗑️  Deleting old artifacts..."
          echo ""
          
          DAYS_OLD="${{ github.event.inputs.days_old || '7' }}"
          CUTOFF_DATE=$(date -d "$DAYS_OLD days ago" -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Get all artifacts older than cutoff
          echo "📋 Fetching old artifacts..."
          ARTIFACTS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq ".artifacts[] | select(.created_at < \"$CUTOFF_DATE\") | .id")
          
          if [ -z "$ARTIFACTS" ]; then
            echo "✅ No old artifacts found"
          else
            ARTIFACT_COUNT=$(echo "$ARTIFACTS" | wc -l)
            echo "🗑️  Found $ARTIFACT_COUNT old artifacts to delete"
            echo ""
            
            # Delete each artifact
            DELETED=0
            FAILED=0
            for ARTIFACT_ID in $ARTIFACTS; do
              echo "  Deleting artifact #$ARTIFACT_ID..."
              if gh api \
                --method DELETE \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID" 2>/dev/null; then
                DELETED=$((DELETED + 1))
              else
                FAILED=$((FAILED + 1))
              fi
            done
            
            echo ""
            echo "📊 Summary:"
            echo "  ✅ Deleted: $DELETED artifacts"
            if [ $FAILED -gt 0 ]; then
              echo "  ⚠️  Failed: $FAILED artifacts"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Show remaining storage
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║              📊 REMAINING STORAGE USAGE                    ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          
          # Get current artifact storage
          echo "📦 Artifact Storage:"
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '.artifacts | length as $count | map(.size_in_bytes) | add // 0 | . as $total | "  • Total artifacts: \($count)\n  • Total size: \($total / 1024 / 1024 | floor)MB"'
          
          echo ""
          echo "🗂️  Workflow Runs:"
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/actions/runs?per_page=100" \
            --jq '.workflow_runs | length as $count | "  • Total runs: \($count)"'
          
          echo ""
          echo "✅ Cleanup completed successfully!"
          echo ""
          echo "💡 TIP: Run this workflow regularly to keep storage usage low"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
