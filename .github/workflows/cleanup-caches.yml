name: Cleanup All Caches

on:
  # Manual trigger only
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DELETE" to confirm cache cleanup'
        required: true
        default: ''

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DELETE" ]; then
            echo "❌ Confirmation failed!"
            echo "Please type 'DELETE' in the confirmation field to proceed"
            exit 1
          fi
          echo "✅ Confirmation verified"
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Clear GitHub Actions cache
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║           🧹 CLEARING ALL GITHUB ACTIONS CACHES            ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          
          # Get all cache keys
          echo "📋 Fetching all cache keys..."
          gh extension install actions/gh-actions-cache || true
          
          echo ""
          echo "🗑️  Deleting all caches..."
          
          # Delete all caches for this repository
          gh actions-cache delete --all --confirm || echo "No caches to delete or command failed"
          
          echo ""
          echo "✅ Cache cleanup completed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Clear Docker build cache
        run: |
          echo ""
          echo "🐳 Clearing Docker build cache..."
          docker builder prune -af --filter "until=1h" 2>/dev/null || true
          docker system prune -af --volumes 2>/dev/null || true
          echo "✅ Docker cache cleared"
      
      - name: Clear Go build cache
        run: |
          echo ""
          echo "🔧 Clearing Go build cache..."
          go clean -cache -modcache -testcache 2>/dev/null || true
          echo "✅ Go cache cleared"
      
      - name: Clear npm cache
        run: |
          echo ""
          echo "📦 Clearing npm cache..."
          npm cache clean --force 2>/dev/null || true
          echo "✅ npm cache cleared"
      
      - name: Clear pip cache
        run: |
          echo ""
          echo "🐍 Clearing pip cache..."
          pip cache purge 2>/dev/null || true
          echo "✅ pip cache cleared"
      
      - name: Clear apt cache
        run: |
          echo ""
          echo "📦 Clearing apt cache..."
          sudo apt-get clean 2>/dev/null || true
          sudo rm -rf /var/lib/apt/lists/* 2>/dev/null || true
          echo "✅ apt cache cleared"
      
      - name: Clear GitHub Actions cache directories
        run: |
          echo ""
          echo "🗂️  Clearing GitHub Actions cache directories..."
          sudo rm -rf /opt/hostedtoolcache/* 2>/dev/null || true
          sudo rm -rf ~/.cache/* 2>/dev/null || true
          sudo rm -rf /tmp/* 2>/dev/null || true
          echo "✅ Cache directories cleared"
      
      - name: Show disk space after cleanup
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║              💾 DISK SPACE AFTER CLEANUP                   ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          df -h /
          echo ""
          echo "📊 Disk usage by directory:"
          du -sh /* 2>/dev/null | sort -h | tail -20 || true
          echo ""
          echo "✅ Cleanup completed successfully!"
          echo ""
          echo "💡 TIP: This freed up space for the next recording session"
