version: '3.8'

services:
  # FlareSolverr - Cloudflare bypass service
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=UTC
      - HEADLESS=true
      - BROWSER_TIMEOUT=40000
      - TEST_URL=https://www.google.com
    ports:
      - "8191:8191"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - recorder-network

  # GoOnDVR - Stream recorder
  recorder:
    build: .
    container_name: goondvr
    environment:
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
    ports:
      - "8080:8080"
    volumes:
      - ./videos:/usr/src/app/videos
      - ./database:/usr/src/app/database
      - ./conf:/usr/src/app/conf
    depends_on:
      flaresolverr:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - recorder-network

networks:
  recorder-network:
    driver: bridge
